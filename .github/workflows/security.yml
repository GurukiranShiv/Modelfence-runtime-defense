name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 12 * * 1"

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[web,dev]"
      - name: Dependency audit
        run: pip-audit
      - name: Bandit scan
        run: bandit -r aegisrt -f json -o bandit-report.json || true
      - name: Static audit with aegisRT
        run: aegisrt audit aegisrt --format sarif --output .aegisrt/audit.sarif.json || true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('.aegisrt/audit.sarif.json') != ''
        with:
          sarif_file: .aegisrt/audit.sarif.json
